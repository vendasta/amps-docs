<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Quiz</title>
  <style>
    * { box-sizing: border-box; }
    body {
      font-family: 'Segoe UI', system-ui, sans-serif;
      margin: 0;
      padding: 20px;
      background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
      color: #eee;
      min-height: 100vh;
      text-align: center;
    }
    .screen { display: none; max-width: 620px; margin: 0 auto; }
    .screen.active { display: block; animation: fadeIn 0.3s ease; }
    @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    h1 { font-size: 1.8rem; margin-bottom: 10px; }
    .timer {
      font-size: 2rem;
      font-weight: bold;
      color: #4ade80;
      margin: 15px 0;
    }
    .timer.warning { color: #fbbf24; }
    .timer.danger { color: #f87171; animation: pulse 0.5s ease infinite; }
    @keyframes pulse { 50% { opacity: 0.7; } }
    .score { font-size: 1.2rem; color: #a5b4fc; margin-bottom: 20px; }
    .player-badge { font-size: 1rem; color: #94a3b8; margin-bottom: 8px; }
    .question {
      font-size: 1.25rem;
      margin: 20px 0;
      line-height: 1.5;
    }
    .options { display: flex; flex-direction: column; gap: 12px; margin: 25px 0; }
    .option {
      padding: 16px 20px;
      background: rgba(255,255,255,0.08);
      border: 2px solid rgba(255,255,255,0.2);
      border-radius: 12px;
      cursor: pointer;
      text-align: left;
      font-size: 1rem;
      transition: all 0.2s;
    }
    .option:hover { background: rgba(255,255,255,0.15); border-color: #818cf8; }
    .option.selected { border-color: #4ade80; background: rgba(74,222,128,0.2); }
    .option.correct { border-color: #4ade80; background: rgba(74,222,128,0.3); }
    .option.wrong { border-color: #f87171; background: rgba(248,113,113,0.2); }
    button {
      padding: 14px 28px;
      font-size: 1rem;
      border: none;
      border-radius: 10px;
      cursor: pointer;
      background: #6366f1;
      color: white;
      font-weight: 600;
      margin-top: 10px;
      transition: transform 0.2s, box-shadow 0.2s;
    }
    button:hover { background: #4f46e5; transform: translateY(-1px); box-shadow: 0 4px 12px rgba(99,102,241,0.4); }
    button:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }
    .game-area {
      position: relative;
      width: 100%;
      height: 320px;
      background: rgba(0,0,0,0.3);
      border-radius: 12px;
      overflow: hidden;
      margin: 20px 0;
    }
    .target {
      position: absolute;
      width: 52px;
      height: 52px;
      background: radial-gradient(circle at 30% 30%, #fcd34d, #f59e0b);
      border-radius: 50%;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: bold;
      color: #fff;
      box-shadow: 0 4px 20px rgba(245,158,11,0.6);
      animation: targetPop 0.25s ease, targetPulse 1.2s ease infinite 0.25s;
    }
    .target:hover { transform: scale(1.15); box-shadow: 0 6px 25px rgba(245,158,11,0.8); }
    .target.clicked { animation: targetBurst 0.35s ease forwards; }
    @keyframes targetPop {
      from { transform: scale(0); opacity: 0; }
      to { transform: scale(1); opacity: 1; }
    }
    @keyframes targetPulse {
      0%, 100% { box-shadow: 0 4px 20px rgba(245,158,11,0.6); }
      50% { box-shadow: 0 4px 28px rgba(245,158,11,0.9); }
    }
    @keyframes targetBurst {
      0% { transform: scale(1); opacity: 1; }
      50% { transform: scale(1.4); opacity: 0.8; }
      100% { transform: scale(1.8); opacity: 0; }
    }
    .falling-item {
      position: absolute;
      width: 44px;
      height: 44px;
      background: linear-gradient(145deg, #4ade80, #22c55e);
      border-radius: 12px;
      left: 0;
      top: 0;
      box-shadow: 0 4px 15px rgba(34,197,94,0.5);
      animation: fallWobble 0.15s ease infinite;
    }
    @keyframes fallWobble {
      0%, 100% { transform: rotate(-1deg); }
      50% { transform: rotate(1deg); }
    }
    .falling-item.caught { animation: catchFlash 0.3s ease forwards; }
    @keyframes catchFlash {
      0% { transform: scale(1); opacity: 1; }
      50% { transform: scale(1.3); opacity: 0.9; }
      100% { transform: scale(0); opacity: 0; }
    }
    .paddle {
      position: absolute;
      bottom: 12px;
      left: 50%;
      transform: translateX(-50%);
      width: 110px;
      height: 24px;
      background: linear-gradient(180deg, #818cf8, #6366f1);
      border-radius: 8px;
      transition: left 0.05s ease-out;
      box-shadow: 0 4px 20px rgba(99,102,241,0.5);
      animation: paddleGlow 1.5s ease infinite;
    }
    @keyframes paddleGlow {
      0%, 100% { box-shadow: 0 4px 20px rgba(99,102,241,0.5); }
      50% { box-shadow: 0 4px 28px rgba(99,102,241,0.8); }
    }
    .game-score { font-size: 1.5rem; margin: 10px 0; color: #fbbf24; font-weight: bold; }
    .game-timer { font-size: 1.3rem; color: #a5b4fc; font-weight: 600; }
    .final-score { font-size: 2.5rem; color: #4ade80; margin: 20px 0; }
    .final-breakdown { color: #94a3b8; margin: 10px 0; }
    .loading { color: #94a3b8; }
    input[type="text"] {
      padding: 12px 16px;
      font-size: 1rem;
      border-radius: 10px;
      border: 2px solid rgba(255,255,255,0.2);
      background: rgba(255,255,255,0.1);
      color: #fff;
      width: 100%;
      max-width: 300px;
      margin: 10px 0 20px;
    }
    input[type="text"]:focus { outline: none; border-color: #6366f1; }
    /* Start screen */
    .start-title { font-size: 1.5rem; margin-bottom: 8px; }
    .start-sub { color: #94a3b8; font-size: 0.95rem; margin-bottom: 20px; }
    .char-grid {
      display: grid;
      grid-template-columns: repeat(5, 1fr);
      gap: 10px;
      margin: 20px 0 24px;
      max-width: 320px;
      margin-left: auto;
      margin-right: auto;
    }
    .char-btn {
      width: 56px;
      height: 56px;
      font-size: 2rem;
      border: 3px solid rgba(255,255,255,0.2);
      border-radius: 14px;
      background: rgba(255,255,255,0.06);
      cursor: pointer;
      transition: all 0.2s;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto;
    }
    .char-btn:hover { background: rgba(255,255,255,0.15); border-color: #818cf8; transform: scale(1.08); }
    .char-btn.selected { border-color: #4ade80; background: rgba(74,222,128,0.25); box-shadow: 0 0 20px rgba(74,222,128,0.4); }
    .start-btn { font-size: 1.1rem; padding: 16px 36px; margin-top: 20px; }
    .result-avatar { font-size: 4rem; margin: 10px 0; }
  </style>
</head>
<body>
  <div id="loading" class="screen active">
    <p class="loading">Loading questions...</p>
  </div>

  <div id="start" class="screen">
    <h1 class="start-title">Ready to play?</h1>
    <p class="start-sub">Enter your name and pick a character</p>
    <label for="startName">Your name</label><br>
    <input type="text" id="startName" placeholder="Enter your name" maxlength="50">
    <p style="margin: 16px 0 8px;">Choose your character</p>
    <div class="char-grid" id="charGrid"></div>
    <button class="start-btn" id="startQuizBtn">Start Quiz</button>
  </div>

  <div id="quiz" class="screen">
    <h1>Quiz</h1>
    <div class="player-badge" id="playerBadge"></div>
    <div class="timer" id="quizTimer">5:00</div>
    <div class="score" id="quizScore">Score: 0 (Quiz: 0 + Game: 0)</div>
    <div class="question" id="questionText"></div>
    <div class="options" id="options"></div>
    <button id="submitBtn" disabled>Submit</button>
  </div>

  <div id="gameTargets" class="screen">
    <h1>Hit the targets!</h1>
    <div class="game-timer" id="gameTimer1">10</div>
    <div class="game-score" id="gameScore1">+0</div>
    <div class="game-area" id="targetsArea"></div>
  </div>

  <div id="gameCatch" class="screen">
    <h1>Catch the falling items!</h1>
    <div class="game-timer" id="gameTimer2">10</div>
    <div class="game-score" id="gameScore2">+0</div>
    <div class="game-area" id="catchArea">
      <div class="paddle" id="paddle"></div>
    </div>
  </div>

  <div id="result" class="screen">
    <h1>Quiz complete!</h1>
    <div class="result-avatar" id="resultAvatar"></div>
    <div style="font-size: 1.2rem; margin-bottom: 8px;" id="resultName"></div>
    <div class="final-score" id="finalScore">0</div>
    <div class="final-breakdown" id="finalBreakdown"></div>
    <p>Save your score?</p>
    <input type="text" id="playerName" placeholder="Your name">
    <br><button id="saveScoreBtn">Save score</button>
  </div>

  <script>
    (function() {
      var QUIZ_DURATION_SEC = 300;
      var GAME_DURATION_SEC = 10;
      var POINTS_CORRECT = 100;
      var POINTS_PER_TARGET = 10;
      var POINTS_PER_CATCH = 10;

      var CHARACTERS = ['🦁','🐯','🐻','🐼','🐨','🦊','🐶','🐱','🐸','🐵','🦄','🐲','🦋','🐝','🤠','👽','🦹','🧙','🐙','🦀','🦉','🐰','🐹','🦜','🐢'];

      var questions = [];
      var currentIndex = 0;
      var quizPoints = 0;
      var gamePoints = 0;
      var quizTimerId = null;
      var quizTimeLeft = QUIZ_DURATION_SEC;
      var answered = false;
      var gameBonus = 0;
      var playerName = '';
      var playerChar = '🦁';

      function showScreen(id) {
        document.querySelectorAll('.screen').forEach(function(el) { el.classList.remove('active'); });
        var el = document.getElementById(id);
        if (el) el.classList.add('active');
      }

      function formatTime(sec) {
        var m = Math.floor(sec / 60);
        var s = sec % 60;
        return m + ':' + (s < 10 ? '0' : '') + s;
      }

      function updateQuizTimer() {
        var el = document.getElementById('quizTimer');
        if (!el) return;
        el.textContent = formatTime(quizTimeLeft);
        el.classList.remove('warning', 'danger');
        if (quizTimeLeft <= 60) el.classList.add('danger');
        else if (quizTimeLeft <= 120) el.classList.add('warning');
        if (quizTimeLeft <= 0) endQuiz();
      }

      function startQuizTimer() {
        if (quizTimerId) clearInterval(quizTimerId);
        quizTimeLeft = QUIZ_DURATION_SEC;
        updateQuizTimer();
        quizTimerId = setInterval(function() {
          quizTimeLeft--;
          updateQuizTimer();
          if (quizTimeLeft <= 0) clearInterval(quizTimerId);
        }, 1000);
      }

      function updateScoreDisplay() {
        var el = document.getElementById('quizScore');
        if (el) el.textContent = 'Score: ' + (quizPoints + gamePoints) + ' (Quiz: ' + quizPoints + ' + Game: ' + gamePoints + ')';
      }

      function getQuestion() {
        if (questions.length === 0) return null;
        return questions[currentIndex % questions.length];
      }

      function renderQuestion() {
        if (quizTimeLeft <= 0) {
          endQuiz();
          return;
        }
        answered = false;
        var q = getQuestion();
        if (!q) { endQuiz(); return; }
        var questionNumber = currentIndex + 1;
        document.getElementById('questionText').textContent = questionNumber + '. ' + q.question;
        var opts = ['A', 'B', 'C', 'D'];
        var labels = { A: q.optionA, B: q.optionB, C: q.optionC, D: q.optionD };
        var container = document.getElementById('options');
        container.innerHTML = '';
        opts.forEach(function(key) {
          var div = document.createElement('div');
          div.className = 'option';
          div.dataset.key = key;
          div.textContent = key + '. ' + labels[key];
          div.onclick = function() {
            if (answered) return;
            container.querySelectorAll('.option').forEach(function(o) { o.classList.remove('selected'); });
            div.classList.add('selected');
            document.getElementById('submitBtn').disabled = false;
          };
          container.appendChild(div);
        });
        document.getElementById('submitBtn').disabled = true;
        document.getElementById('submitBtn').textContent = 'Submit';
      }

      function nextQuestion() {
        currentIndex++;
        if (quizTimeLeft > 0) {
          renderQuestion();
        } else {
          endQuiz();
        }
      }

      function playRandomGame(callback) {
        gameBonus = 0;
        var choice = Math.random() < 0.5 ? 'targets' : 'catch';
        if (choice === 'targets') playTargetsGame(callback);
        else playCatchGame(callback);
      }

      function playTargetsGame(callback) {
        showScreen('gameTargets');
        var area = document.getElementById('targetsArea');
        area.innerHTML = '';
        var scoreEl = document.getElementById('gameScore1');
        var timerEl = document.getElementById('gameTimer1');
        var timeLeft = GAME_DURATION_SEC;
        var gameEnded = false;
        timerEl.textContent = timeLeft;
        scoreEl.textContent = '+0';

        function endTargetsGame() {
          if (gameEnded) return;
          gameEnded = true;
          clearInterval(timerInt);
          clearInterval(targetsInt);
          area.querySelectorAll('.target').forEach(function(t) { t.remove(); });
          timerEl.textContent = '0';
          showScreen('quiz');
          try { callback(gameBonus); } catch (e) {}
        }

        var timerInt = setInterval(function() {
          timeLeft--;
          timerEl.textContent = timeLeft > 0 ? timeLeft : 0;
          if (timeLeft <= 0) endTargetsGame();
        }, 1000);

        function addTarget() {
          if (gameEnded) return;
          var t = document.createElement('div');
          t.className = 'target';
          var w = area.offsetWidth - 52;
          var h = area.offsetHeight - 52;
          t.style.left = (Math.random() * (w > 0 ? w : 200)) + 'px';
          t.style.top = (Math.random() * (h > 0 ? h : 200)) + 'px';
          t.onclick = function() {
            t.classList.add('clicked');
            gameBonus += POINTS_PER_TARGET;
            scoreEl.textContent = '+' + gameBonus;
            setTimeout(function() { t.remove(); }, 320);
          };
          area.appendChild(t);
        }

        var targetsInt = setInterval(function() {
          if (gameEnded) return;
          addTarget();
        }, 550);

        setTimeout(function() {
          endTargetsGame();
        }, GAME_DURATION_SEC * 1000 + 800);
      }

      function playCatchGame(callback) {
        showScreen('gameCatch');
        var area = document.getElementById('catchArea');
        var paddle = document.getElementById('paddle');
        var existing = area.querySelectorAll('.falling-item');
        existing.forEach(function(e) { e.remove(); });
        var scoreEl = document.getElementById('gameScore2');
        var timerEl = document.getElementById('gameTimer2');
        var timeLeft = GAME_DURATION_SEC;
        var gameEnded = false;
        timerEl.textContent = timeLeft;
        scoreEl.textContent = '+0';

        var paddleX = 50;
        paddle.style.left = '50%';
        paddle.style.transform = 'translateX(-50%)';
        area.onmousemove = function(e) {
          var r = area.getBoundingClientRect();
          var x = ((e.clientX - r.left) / r.width) * 100;
          if (x < 0) x = 0;
          if (x > 100) x = 100;
          paddleX = x;
          paddle.style.left = x + '%';
          paddle.style.transform = 'translateX(-50%)';
        };

        function endCatchGame() {
          if (gameEnded) return;
          gameEnded = true;
          clearInterval(timerInt);
          clearInterval(fallInt);
          timerEl.textContent = '0';
          showScreen('quiz');
          try { callback(gameBonus); } catch (e) {}
        }

        var timerInt = setInterval(function() {
          timeLeft--;
          timerEl.textContent = timeLeft > 0 ? timeLeft : 0;
          if (timeLeft <= 0) endCatchGame();
        }, 1000);

        function createFalling() {
          if (gameEnded || timeLeft <= 0) return;
          var item = document.createElement('div');
          item.className = 'falling-item';
          var w = area.offsetWidth - 44;
          item.style.left = (Math.random() * (w > 0 ? w : 200)) + 'px';
          item.style.top = '-50px';
          area.appendChild(item);
          var start = Date.now();
          var caught = false;
          var areaH = area.offsetHeight;
          function anim() {
            if (caught || gameEnded) return;
            var elapsed = (Date.now() - start) / 1000;
            var top = elapsed * 95;
            item.style.top = top + 'px';
            var itemRect = item.getBoundingClientRect();
            var paddleRect = paddle.getBoundingClientRect();
            if (itemRect.bottom >= paddleRect.top + 5 && itemRect.top <= paddleRect.bottom - 5 &&
                itemRect.right >= paddleRect.left && itemRect.left <= paddleRect.right) {
              caught = true;
              item.classList.add('caught');
              gameBonus += POINTS_PER_CATCH;
              scoreEl.textContent = '+' + gameBonus;
              setTimeout(function() { item.remove(); }, 280);
              return;
            }
            if (top < areaH + 50 && !caught) requestAnimationFrame(anim);
            else if (!caught) item.remove();
          }
          requestAnimationFrame(anim);
        }

        var fallInt = setInterval(function() {
          if (gameEnded) return;
          createFalling();
        }, 750);

        setTimeout(function() {
          endCatchGame();
        }, GAME_DURATION_SEC * 1000 + 800);
      }

      function onSubmit() {
        if (answered) return;
        var selected = document.querySelector('#options .option.selected');
        if (!selected) return;
        answered = true;
        var key = selected.dataset.key;
        var q = getQuestion();
        var correct = q.correct.toUpperCase();
        document.querySelectorAll('#options .option').forEach(function(o) {
          o.style.pointerEvents = 'none';
          if (o.dataset.key === correct) o.classList.add('correct');
          else if (o.dataset.key === key && key !== correct) o.classList.add('wrong');
        });
        document.getElementById('submitBtn').textContent = key === correct ? 'Correct! Next...' : 'Next question';

        if (key === correct) {
          quizPoints += POINTS_CORRECT;
          updateScoreDisplay();
          document.getElementById('submitBtn').onclick = function() {
            document.getElementById('submitBtn').onclick = onSubmit;
            playRandomGame(function(bonus) {
              gamePoints += bonus;
              updateScoreDisplay();
              showScreen('quiz');
              nextQuestion();
            });
          };
        } else {
          document.getElementById('submitBtn').onclick = function() {
            document.getElementById('submitBtn').onclick = onSubmit;
            nextQuestion();
          };
        }
      }

      function endQuiz() {
        if (quizTimerId) clearInterval(quizTimerId);
        showScreen('result');
        document.getElementById('resultAvatar').textContent = playerChar;
        document.getElementById('resultName').textContent = playerName || 'Player';
        document.getElementById('finalScore').textContent = quizPoints + gamePoints;
        document.getElementById('finalBreakdown').textContent = 'Quiz: ' + quizPoints + ' + Game bonus: ' + gamePoints;
        document.getElementById('playerName').value = playerName || '';
        document.getElementById('saveScoreBtn').onclick = function() {
          var name = document.getElementById('playerName').value.trim() || playerName || 'Anonymous';
          google.script.run.withSuccessHandler(function() {
            document.getElementById('saveScoreBtn').textContent = 'Saved!';
          }).saveScore(name, quizPoints + gamePoints, quizPoints, gamePoints);
        };
      }

      function initStartScreen() {
        var grid = document.getElementById('charGrid');
        grid.innerHTML = '';
        CHARACTERS.forEach(function(ch) {
          var btn = document.createElement('button');
          btn.type = 'button';
          btn.className = 'char-btn' + (ch === playerChar ? ' selected' : '');
          btn.textContent = ch;
          btn.setAttribute('aria-label', 'Select character');
          btn.onclick = function() {
            grid.querySelectorAll('.char-btn').forEach(function(b) { b.classList.remove('selected'); });
            btn.classList.add('selected');
            playerChar = ch;
          };
          grid.appendChild(btn);
        });
        document.getElementById('startQuizBtn').onclick = function() {
          playerName = document.getElementById('startName').value.trim() || 'Player';
          showScreen('quiz');
          document.getElementById('playerBadge').textContent = playerChar + ' ' + playerName;
          startQuizTimer();
          updateScoreDisplay();
          renderQuestion();
          document.getElementById('submitBtn').onclick = onSubmit;
        };
      }

      document.getElementById('submitBtn').onclick = onSubmit;

      google.script.run.withSuccessHandler(function(data) {
        questions = data || [];
        showScreen('loading');
        if (questions.length === 0) {
          document.querySelector('#loading p').textContent = 'No questions found. Add rows to the Questions sheet.';
          return;
        }
        showScreen('start');
        initStartScreen();
      }).getQuestions();
    })();
  </script>
</body>
</html>
